<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mi perfil | BienGastao</title>
  </head>
  <body
    x-data="{ page: 'profile', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main x-data="profilePage()" x-init="init()">
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Heading -->
            <div class="mb-6">
              <h2
                class="text-xl font-semibold text-gray-800 dark:text-white/90"
              >
                Mi perfil
              </h2>
              <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                Consulta tu información y actualiza tus datos
              </p>
            </div>

            <!-- Loading -->
            <template x-if="loading">
              <div
                class="mb-6 rounded-2xl border border-gray-200 bg-white px-5 py-6 text-sm text-gray-600 dark:border-gray-800 dark:bg-white/[0.03] dark:text-gray-400 md:p-6"
              >
                Cargando perfil...
              </div>
            </template>

            <!-- Error -->
            <template x-if="error">
              <div
                class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-400"
                x-text="error"
              ></div>
            </template>

            <template x-if="!loading && profile">
              <div class="space-y-6">
                <!-- Summary card -->
                <div
                  class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
                >
                  <div
                    class="flex flex-col items-center gap-5 sm:flex-row sm:items-center"
                  >
                    <div
                      class="flex h-20 w-20 items-center justify-center rounded-full bg-brand-500 text-2xl font-semibold text-white"
                      x-text="(profile.name || '').split(' ').map(p => p.charAt(0).toUpperCase()).slice(0,2).join('') || 'U'"
                    ></div>
                    <div class="flex-1 text-center sm:text-left">
                      <h3
                        class="text-lg font-semibold text-gray-800 dark:text-white/90"
                        x-text="profile.name"
                      ></h3>
                      <p
                        class="mt-1 text-sm text-gray-500 dark:text-gray-400"
                        x-text="profile.email"
                      ></p>
                    </div>
                    <div
                      class="rounded-xl border border-gray-200 bg-gray-50 px-5 py-3 text-center dark:border-gray-800 dark:bg-gray-800/50"
                    >
                      <p class="text-xs text-gray-500 dark:text-gray-400">
                        Balance actual
                      </p>
                      <p
                        class="mt-1 text-lg font-bold text-gray-800 dark:text-white/90"
                        x-text="formatCurrency(profile.balance)"
                      ></p>
                    </div>
                  </div>
                </div>

                <!-- Edit form -->
                <div
                  class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
                >
                  <h3
                    class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90"
                  >
                    Información personal
                  </h3>

                  <template x-if="saveOk">
                    <div
                      class="mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700 dark:border-green-500/30 dark:bg-green-500/10 dark:text-green-400"
                    >
                      Perfil actualizado correctamente.
                    </div>
                  </template>

                  <template x-if="saveErr">
                    <div
                      class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-400"
                      x-text="saveErr"
                    ></div>
                  </template>

                  <form @submit.prevent="save()" class="space-y-5">
                    <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
                      <div>
                        <label
                          class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                          for="profile-name"
                        >
                          Nombre completo
                        </label>
                        <input
                          id="profile-name"
                          type="text"
                          x-model="form.name"
                          class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                          required
                        />
                      </div>

                      <div>
                        <label
                          class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                          for="profile-email"
                        >
                          Email
                        </label>
                        <input
                          id="profile-email"
                          type="email"
                          x-model="form.email"
                          class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                          required
                        />
                      </div>
                    </div>

                    <div class="flex justify-end">
                      <button
                        type="submit"
                        :disabled="saving"
                        class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-6 text-sm font-medium text-white hover:bg-brand-600 disabled:cursor-not-allowed disabled:opacity-60"
                      >
                        <span x-show="!saving">Guardar cambios</span>
                        <span x-show="saving">Guardando...</span>
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </template>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>

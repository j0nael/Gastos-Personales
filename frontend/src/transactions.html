<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Transacciones | BienGastao</title>
  </head>
  <body
    x-data="{ page: 'transactions', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main x-data="transactionsPage()" x-init="init()">
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Page Header -->
            <div
              class="mb-6 flex flex-col justify-between gap-4 sm:flex-row sm:items-center"
            >
              <div>
                <h2
                  class="text-xl font-semibold text-gray-800 dark:text-white/90"
                >
                  Transacciones
                </h2>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                  Gestiona tus ingresos y gastos
                </p>
              </div>
              <button
                type="button"
                @click="openCreate()"
                class="inline-flex items-center justify-center gap-2 rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600"
              >
                <svg
                  class="h-4 w-4"
                  width="16"
                  height="16"
                  viewBox="0 0 16 16"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M8 3.333a.667.667 0 01.667.667v3.333H12a.667.667 0 110 1.334H8.667V12a.667.667 0 11-1.334 0V8.667H4a.667.667 0 110-1.334h3.333V4A.667.667 0 018 3.333z"
                    fill="currentColor"
                  />
                </svg>
                Nueva transacción
              </button>
            </div>

            <!-- Filters -->
            <div
              class="mb-6 rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
            >
              <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-5">
                <div>
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Tipo
                  </label>
                  <select
                    x-model="filterType"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  >
                    <option value="">Todos</option>
                    <template x-for="t in types" :key="t">
                      <option :value="t" x-text="typeLabels[t]"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Categoría
                  </label>
                  <select
                    x-model="filterCategory"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  >
                    <option value="">Todas</option>
                    <template x-for="c in categories" :key="c">
                      <option :value="c" x-text="categoryLabels[c]"></option>
                    </template>
                  </select>
                </div>

                <div>
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Desde
                  </label>
                  <input
                    type="date"
                    x-model="filterStart"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                </div>

                <div>
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Hasta
                  </label>
                  <input
                    type="date"
                    x-model="filterEnd"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  />
                </div>

                <div class="flex items-end gap-2">
                  <button
                    type="button"
                    @click="applyFilters()"
                    class="inline-flex h-11 flex-1 items-center justify-center rounded-lg bg-brand-500 px-4 text-sm font-medium text-white hover:bg-brand-600"
                  >
                    Aplicar
                  </button>
                  <button
                    type="button"
                    @click="clearFilters()"
                    class="inline-flex h-11 items-center justify-center rounded-lg border border-gray-300 bg-white px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300"
                  >
                    Limpiar
                  </button>
                </div>
              </div>
            </div>

            <!-- Error -->
            <template x-if="error">
              <div
                class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-400"
                x-text="error"
              ></div>
            </template>

            <!-- Table -->
            <div
              class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
            >
              <div class="overflow-x-auto">
                <table class="min-w-full">
                  <thead
                    class="border-b border-gray-100 dark:border-gray-800"
                  >
                    <tr>
                      <th
                        class="px-5 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 sm:px-6"
                      >
                        Fecha
                      </th>
                      <th
                        class="px-5 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400"
                      >
                        Categoría
                      </th>
                      <th
                        class="px-5 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400"
                      >
                        Tipo
                      </th>
                      <th
                        class="px-5 py-3 text-right text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400"
                      >
                        Monto
                      </th>
                      <th
                        class="px-5 py-3 text-right text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 sm:px-6"
                      >
                        Acciones
                      </th>
                    </tr>
                  </thead>
                  <tbody
                    class="divide-y divide-gray-100 dark:divide-gray-800"
                  >
                    <template x-if="loading">
                      <tr>
                        <td
                          colspan="5"
                          class="px-5 py-10 text-center text-sm text-gray-500 dark:text-gray-400 sm:px-6"
                        >
                          Cargando transacciones...
                        </td>
                      </tr>
                    </template>

                    <template x-if="!loading && items.length === 0">
                      <tr>
                        <td
                          colspan="5"
                          class="px-5 py-10 text-center text-sm text-gray-500 dark:text-gray-400 sm:px-6"
                        >
                          No se encontraron transacciones con estos filtros.
                        </td>
                      </tr>
                    </template>

                    <template x-for="t in items" :key="t._id">
                      <tr>
                        <td
                          class="px-5 py-4 text-sm text-gray-700 dark:text-gray-300 sm:px-6"
                          x-text="formatDate(t.createdAt)"
                        ></td>
                        <td
                          class="px-5 py-4 text-sm text-gray-700 dark:text-gray-300"
                          x-text="categoryLabels[t.category] || t.category"
                        ></td>
                        <td class="px-5 py-4">
                          <span
                            :class="t.type === 'INCOME'
                              ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-500'
                              : 'bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-500'"
                            class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium"
                            x-text="typeLabels[t.type] || t.type"
                          ></span>
                        </td>
                        <td
                          class="px-5 py-4 text-right text-sm font-semibold"
                          :class="t.type === 'INCOME' ? 'text-success-600' : 'text-error-600'"
                        >
                          <span
                            x-text="(t.type === 'INCOME' ? '+ ' : '- ') + formatCurrency(t.amount)"
                          ></span>
                        </td>
                        <td class="px-5 py-4 text-right sm:px-6">
                          <div class="flex items-center justify-end gap-2">
                            <button
                              type="button"
                              @click="openEdit(t)"
                              class="inline-flex h-8 items-center justify-center rounded-lg border border-gray-300 bg-white px-3 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300"
                            >
                              Editar
                            </button>
                            <button
                              type="button"
                              @click="remove(t)"
                              class="inline-flex h-8 items-center justify-center rounded-lg border border-red-200 bg-red-50 px-3 text-xs font-medium text-red-600 hover:bg-red-100 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-400"
                            >
                              Eliminar
                            </button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <div
                class="flex flex-col items-center justify-between gap-3 border-t border-gray-100 px-5 py-4 dark:border-gray-800 sm:flex-row sm:px-6"
              >
                <p class="text-sm text-gray-500 dark:text-gray-400">
                  <span x-text="total"></span>
                  transacciones ·
                  Página <span x-text="page"></span> de
                  <span x-text="totalPages"></span>
                </p>
                <div class="flex items-center gap-2">
                  <button
                    type="button"
                    @click="prevPage()"
                    :disabled="page <= 1 || loading"
                    class="inline-flex h-9 items-center justify-center rounded-lg border border-gray-300 bg-white px-3 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300"
                  >
                    Anterior
                  </button>
                  <button
                    type="button"
                    @click="nextPage()"
                    :disabled="page >= totalPages || loading"
                    class="inline-flex h-9 items-center justify-center rounded-lg border border-gray-300 bg-white px-3 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300"
                  >
                    Siguiente
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- ===== Modal: Create / Edit Transaction ===== -->
          <div
            x-show="showModal"
            x-cloak
            x-transition.opacity
            class="fixed inset-0 z-9999 flex items-center justify-center bg-gray-900/60 px-4 py-6"
            @keydown.escape.window="closeModal()"
          >
            <div
              class="w-full max-w-md rounded-2xl bg-white p-6 shadow-lg dark:bg-gray-900"
              @click.outside="closeModal()"
            >
              <div class="mb-5 flex items-center justify-between">
                <h3
                  class="text-lg font-semibold text-gray-800 dark:text-white/90"
                  x-text="modalMode === 'create' ? 'Nueva transacción' : 'Editar transacción'"
                ></h3>
                <button
                  type="button"
                  @click="closeModal()"
                  class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 20 20"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M5.292 5.292a1 1 0 011.416 0L10 8.584l3.292-3.292a1 1 0 111.416 1.416L11.416 10l3.292 3.292a1 1 0 01-1.416 1.416L10 11.416l-3.292 3.292a1 1 0 01-1.416-1.416L8.584 10 5.292 6.708a1 1 0 010-1.416z"
                      fill="currentColor"
                    />
                  </svg>
                </button>
              </div>

              <form @submit.prevent="save()">
                <template x-if="saveError">
                  <div
                    class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-500/30 dark:bg-red-500/10 dark:text-red-400"
                    x-text="saveError"
                  ></div>
                </template>

                <div class="mb-4">
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Tipo
                  </label>
                  <select
                    x-model="form.type"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  >
                    <template x-for="t in types" :key="t">
                      <option :value="t" x-text="typeLabels[t]"></option>
                    </template>
                  </select>
                </div>

                <div class="mb-4">
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Categoría
                  </label>
                  <select
                    x-model="form.category"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                  >
                    <template x-for="c in categories" :key="c">
                      <option :value="c" x-text="categoryLabels[c]"></option>
                    </template>
                  </select>
                </div>

                <div class="mb-5">
                  <label
                    class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300"
                  >
                    Monto
                  </label>
                  <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    x-model="form.amount"
                    placeholder="0.00"
                    class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-3 text-sm text-gray-800 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                    required
                  />
                </div>

                <div class="flex items-center justify-end gap-2">
                  <button
                    type="button"
                    @click="closeModal()"
                    class="inline-flex h-11 items-center justify-center rounded-lg border border-gray-300 bg-white px-4 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300"
                  >
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    :disabled="saving"
                    class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600 disabled:cursor-not-allowed disabled:opacity-60"
                  >
                    <span x-show="!saving">Guardar</span>
                    <span x-show="saving">Guardando...</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
          <!-- ===== End Modal ===== -->
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
